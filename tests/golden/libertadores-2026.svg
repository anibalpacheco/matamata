    .pd-team { fill: #e5e7eb; }
    .pd-score { fill: #e5e7eb; }
    .pd-win .pd-team, .pd-win .pd-score { fill: #34d399; }
    .pd-crest-frame { stroke: #334155; }
    .pd-link { stroke: #475569; }

  .pd-crest-frame { fill: none; stroke: #d1d5db; stroke-width: 1; }
  .pd-link { fill: none; stroke: #cbd5e1; stroke-width: 1.5; }
  @media (prefers-color-scheme: dark) {
    .pd-bg { fill: #0f172a; }

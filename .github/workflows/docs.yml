name: Docs

# Build the mkdocs site and deploy it to GitHub Pages (the gh-pages branch) on
# every push to main, so the published manual tracks the code.
on:
  push:
    branches: [main]

permissions:
  contents: write  # mkdocs gh-deploy pushes the built site to the gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install mkdocs
        run: python -m pip install --upgrade mkdocs

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
